name: Tokenomics Daily Collection

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  # Opt into Node 24 early so the deprecation of Node 20 actions is a no-op.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run token collection
        run: python tokenomics_data/fetch_tokens.py

      - name: Commit and push updated data
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tokenomics_data/
          if git diff --staged --quiet; then
            echo "No new data — nothing to commit."
          else
            git commit -m "data: tokenomics update $(date -u +%Y-%m-%d)"
            git push origin HEAD
          fi
